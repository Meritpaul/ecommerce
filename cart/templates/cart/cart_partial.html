{% for item in cart %}
<div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl" data-price="{{ item.product.price }}">
    <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}"
        class="w-14 h-14 object-cover rounded-lg flex-shrink-0">
    <div class="flex-1 min-w-0">
        <p class="font-medium text-sm text-gray-800 truncate">{{ item.product.name }}</p>
        <p class="text-xs text-gray-500">{{ item.product.price }} TK each</p>
        <div class="flex items-center gap-2 mt-1.5">
            <button class="cart-btn w-6 h-6 bg-white border rounded-full text-sm font-bold hover:bg-orange-50 hover:border-orange-400 transition"
                    data-action="decrease" data-product-id="{{ item.product.id }}">−</button>
            <span class="text-sm font-semibold w-5 text-center">{{ item.quantity }}</span>
            <button class="cart-btn w-6 h-6 bg-white border rounded-full text-sm font-bold hover:bg-orange-50 hover:border-orange-400 transition"
                    data-action="increase" data-product-id="{{ item.product.id }}">+</button>
        </div>
    </div>
    <div class="text-right flex-shrink-0">
        <p class="font-bold text-green-600 text-sm">{{ item.total_price }} TK</p>
        <button class="cart-btn text-xs text-red-400 hover:text-red-600 transition mt-1"
                data-action="remove" data-product-id="{{ item.product.id }}">Remove</button>
    </div>
</div>
{% empty %}
<div class="flex flex-col items-center justify-center h-48 text-gray-400">
    <div class="text-5xl mb-3">🛒</div>
    <p class="font-medium">Your cart is empty</p>
</div>
{% endfor %}
