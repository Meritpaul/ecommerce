// cart_api.html file
{% for item in cart %}
<div class="flex items-center justify-between border-b py-2" data-price="{{ item.product.price }}">
    <!-- Product Info -->
    <div class="flex items-center gap-4">
        <img src="{{ item.product.image.url }}" class="w-16 h-16 object-cover">
        <div>
            <h3 class="font-semibold">{{ item.product.name }}</h3>
            <p class="text-gray-500">{{ item.product.price }} TK</p>
        </div>
    </div>

    <!-- Quantity Controls -->
    <div class="flex items-center gap-1">
        <button type="button" data-action="decrease" data-product-id="{{ item.product.id }}" class="cart-btn bg-orange-500 px-2 rounded">-</button>
        <span class="px-2">{{ item.quantity }}</span>
        <button type="button" data-action="increase" data-product-id="{{ item.product.id }}" class="cart-btn bg-orange-500 px-2 rounded">+</button>
        <button type="button" data-action="remove" data-product-id="{{ item.product.id }}" class="cart-btn text-red-700 ml-2">Remove</button>
    </div>

    <!-- Item Total -->
    <div class="font-bold text-green-600">{{ item.total_price }} TK</div>
</div>
{% empty %}
<p class="text-gray-500">Your cart is empty 🛒</p>
{% endfor %}

<!-- Drawer Total -->
<div id="drawer-total" style="display:none;">
    {{ cart.get_total_price }} TK
</div>
