{% extends 'base.html' %}

{% block content %}


<form method="POST">
{% csrf_token %}

<div class="max-w-7xl mx-auto p-6 grid lg:grid-cols-3 gap-8">

    <!-- LEFT SIDE -->
    <div class="lg:col-span-2 space-y-6">

        <!-- Order Review -->
        <div class="bg-white p-5 rounded-xl shadow-sm border">
            <h2 class="text-lg font-semibold mb-4">🧾 Order Review</h2>

            {% for item in cart %}
            <div class="flex items-center justify-between border-b py-3">
                <div class="flex items-center gap-4">
                    <img src="{{ item.product.image.url }}"
                        class="w-14 h-14 object-cover rounded">
                    <div>
                        <p class="font-medium">{{ item.product.name }}</p>
                        <p class="text-sm text-gray-500">
                            Qty: {{ item.quantity }}
                        </p>
                    </div>
                </div>

                <div class="font-semibold text-green-600">
                    {{ item.total_price }} TK
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Shipping -->
        <div class="bg-white p-5 rounded-xl shadow-sm border space-y-3">
            <h2 class="text-lg font-semibold">📍 Shipping Address</h2>

            <input type="text" name="name" required placeholder="Full Name"
                class="w-full border p-2 rounded">

            <input type="text" name="phone" required placeholder="Phone"
                class="w-full border p-2 rounded">

            <textarea name="address" required placeholder="Address"
                class="w-full border p-2 rounded"></textarea>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="space-y-6">

        <!-- Summary -->
        <div class="bg-white p-5 rounded-xl shadow-sm border sticky top-6">

            <h2 class="text-lg font-semibold mb-3">🧾 Summary</h2>

            <div class="flex justify-between">
                <div class="flex justify-between text-gray-600">
                    <span>Subtotal</span>
                    <span>{{ subtotal }} TK</span>
                </div>
                
                <div class="flex justify-between text-gray-600 mt-2">
                    <span>Delivery</span>
                </div>
                
                <div class="flex justify-between font-bold text-lg mt-4 border-t pt-3">
                    <span>Total</span>
                    <span class="text-green-600">
                        {{ total }} TK
                    </span>
                </div>
            </div>

            <!-- ✅ THIS BUTTON NOW WORKS -->
            <button type="submit"
                class="w-full bg-orange-500 text-white py-3 rounded mt-4">
                🚀 Pay Now
            </button>

        </div>

    </div>

</div>

</form>
{% endblock %}
