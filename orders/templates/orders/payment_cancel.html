{% extends 'base.html' %}

{% block title %}Payment Cancelled{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10 text-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-6xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-yellow-500 mb-2">Payment Cancelled</h1>
        <p class="text-gray-600 mb-6">
            You cancelled the payment process. Your cart items are still saved —
            you can complete the checkout whenever you're ready.
        </p>
        <div class="flex gap-3">
            <a href="/" class="flex-1 border border-gray-200 text-gray-600 py-3 rounded-xl hover:bg-gray-50 transition font-medium">
                Back to Home
            </a>
            <a href="{% url 'checkout' %}" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition">
                Resume Checkout
            </a>
        </div>
    </div>
</div>
{% endblock %}
