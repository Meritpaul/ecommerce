{% extends 'base.html' %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-10">

    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">
            Create Account
        </h1>
        <p class="text-center text-gray-500 text-sm mb-6">
            Join PureShop and start shopping fresh 🌿
        </p>

        <form method="POST" class="space-y-3" autocomplete="off">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                value="{{ form_data.username|default:'' }}"
                class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                minlength="3" required autocomplete="off">

            <input type="email" name="email" placeholder="Email"
                value="{{ form_data.email|default:'' }}"
                class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                required autocomplete="email">

            <input type="tel" name="phone" placeholder="01XXXXXXXXX or +8801XXXXXXXXX"
                value="{{ form_data.phone|default:'' }}"
                pattern="(\+?880|0)0?1[3-9][0-9]{8}"
                maxlength="17" inputmode="tel"
                title="Valid Bangladeshi phone number (e.g., 01812109120 or +8801812109120)"
                class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400
                       invalid:border-red-400 invalid:focus:ring-red-400"
                required>

            <div class="relative">
                <input type="password" name="password1" id="reg-password1" placeholder="Password (min 8 characters)"
                    minlength="8"
                    class="w-full border p-3 pr-12 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                    required autocomplete="new-password">
                <button type="button" onclick="togglePassword('reg-password1', this)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
                    aria-label="Show password" tabindex="-1">
                    <svg class="eye-show w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <svg class="eye-hide w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                    </svg>
                </button>
            </div>

            <div class="relative">
                <input type="password" name="password2" id="reg-password2" placeholder="Confirm Password"
                    minlength="8"
                    class="w-full border p-3 pr-12 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
                    required autocomplete="new-password">
                <button type="button" onclick="togglePassword('reg-password2', this)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
                    aria-label="Show password" tabindex="-1">
                    <svg class="eye-show w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <svg class="eye-hide w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                    </svg>
                </button>
            </div>

            <button class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition">
                Register
            </button>
        </form>

        <p class="text-center text-sm mt-6 text-gray-500">
            Already have an account?
            <a href="{% url 'login' %}" class="text-orange-500 font-semibold hover:underline">
                Sign in
            </a>
        </p>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const showIcon = btn.querySelector('.eye-show');
    const hideIcon = btn.querySelector('.eye-hide');

    if (input.type === 'password') {
        input.type = 'text';
        showIcon.classList.add('hidden');
        hideIcon.classList.remove('hidden');
        btn.setAttribute('aria-label', 'Hide password');
    } else {
        input.type = 'password';
        showIcon.classList.remove('hidden');
        hideIcon.classList.add('hidden');
        btn.setAttribute('aria-label', 'Show password');
    }
}
</script>
{% endblock %}
