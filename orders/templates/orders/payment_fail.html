{% extends 'base.html' %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10 text-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-6xl mb-4">❌</div>
        <h1 class="text-2xl font-bold text-red-500 mb-2">Payment Failed</h1>
        <p class="text-gray-600 mb-6">
            Something went wrong while processing your payment. No amount has been deducted.
            Please try again or use a different payment method.
        </p>
        <div class="flex gap-3">
            <a href="/" class="flex-1 border border-gray-200 text-gray-600 py-3 rounded-xl hover:bg-gray-50 transition font-medium">
                Back to Home
            </a>
            <a href="{% url 'checkout' %}" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition">
                Try Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
