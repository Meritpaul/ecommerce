<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<form method="post" class="bg-white p-6 rounded shadow w-80">
    <h2 class="text-xl font-bold mb-4">Register</h2>

    {% csrf_token %}

    <!-- messages -->
    {% for message in messages %}
        <p class="text-red-500 text-sm">{{ message }}</p>
    {% endfor %}

    <input name="username" placeholder="Username" class="w-full p-2 border mb-2">

    <input name="password1" type="password" placeholder="Password" class="w-full p-2 border mb-2">

    <input name="password2" type="password" placeholder="Confirm Password" class="w-full p-2 border mb-2">

    <button class="bg-green-600 text-white w-full py-2 rounded">
        Register
    </button>

    <p class="mt-2 text-sm">
        Already have account? <a href="{% url 'login' %}" class="text-green-600">Login</a>
    </p>
</form>

</body>
</html>
